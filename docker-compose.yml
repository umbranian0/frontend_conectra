services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connecttroca-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_STRAPI_URL: ${VITE_STRAPI_URL:-http://host.docker.internal:1337}
      VITE_STRAPI_AUTH_ENDPOINT: ${VITE_STRAPI_AUTH_ENDPOINT:-/api/auth/local}
      VITE_STRAPI_USERS_ENDPOINT: ${VITE_STRAPI_USERS_ENDPOINT:-/api/users}
      VITE_STRAPI_ACTIVITIES_ENDPOINT: ${VITE_STRAPI_ACTIVITIES_ENDPOINT:-/api/activities}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev:host
    restart: unless-stopped

volumes:
  frontend_node_modules: