services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connecttroca-frontend
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev:host
    restart: unless-stopped

volumes:
  frontend_node_modules: